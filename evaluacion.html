<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Conocimiento - Impacto del Caucho</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-gradient: radial-gradient(circle at center, #0f2c1f 0%, #06110c 100%);
            --color-turf: #10b981;
            --color-turf-glow: #34d399;
            --color-accent-lime: #a3e635;
            --color-accent-orange: #f97316;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --card-bg: rgba(15, 36, 26, 0.45);
            --card-border: rgba(16, 185, 129, 0.15);
            --font-title: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }
        .app-header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 700px;
        }
        .app-badge {
            font-family: var(--font-title);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--color-turf-glow);
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .app-title {
            font-family: var(--font-title);
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--color-turf-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .app-subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin-top: 10px;
            font-weight: 300;
        }
        .progress-bar-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--color-turf), var(--color-accent-lime));
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .progress-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            max-width: 800px;
            width: 100%;
            text-align: right;
        }
        .quiz-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(16,185,129,0.15);
            min-height: 420px;
            display: flex;
            flex-direction: column;
        }
        .question-number {
            font-family: var(--font-title);
            font-size: 0.9rem;
            color: var(--color-turf-glow);
            margin-bottom: 10px;
            font-weight: 600;
        }
        .question-category {
            display: inline-block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            padding: 4px 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .question-text {
            font-family: var(--font-title);
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 25px;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }
        .option-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 16px 20px;
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-family: var(--font-body);
        }
        .option-btn:hover:not(.disabled) {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--text-primary);
            transform: translateX(5px);
        }
        .option-btn.correct {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--color-turf);
            color: var(--color-turf-glow);
        }
        .option-btn.correct::after {
            content: " \2713";
            font-weight: 700;
        }
        .option-btn.incorrect {
            background: rgba(249, 115, 22, 0.15);
            border-color: var(--color-accent-orange);
            color: var(--color-accent-orange);
        }
        .option-btn.incorrect::after {
            content: " \2717";
            font-weight: 700;
        }
        .option-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }
        .option-btn.show-correct {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.2);
        }
        .btn-next {
            align-self: flex-end;
            margin-top: 20px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--color-turf);
            color: var(--color-turf-glow);
            padding: 12px 32px;
            border-radius: 12px;
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }
        .btn-next:hover {
            background: rgba(16, 185, 129, 0.25);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }
        .explanation-box {
            margin-top: 15px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--color-turf);
            border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: none;
        }
        .explanation-box strong {
            color: var(--color-turf-glow);
        }
        /* Pantalla de resultados */
        .results-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            padding: 20px 0;
        }
        .results-screen.visible {
            display: flex;
        }
        .results-icon {
            font-size: 4rem;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid rgba(16, 185, 129, 0.3);
        }
        .results-score {
            font-family: var(--font-title);
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--color-turf-glow);
        }
        .results-label {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
        .results-detail {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 500px;
            line-height: 1.6;
        }
        .results-level {
            font-family: var(--font-title);
            font-size: 1.5rem;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 20px;
            border: 1px solid;
        }
        .level-basico { color: #f97316; border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.1); }
        .level-intermedio { color: #eab308; border-color: rgba(234,179,8,0.3); background: rgba(234,179,8,0.1); }
        .level-avanzado { color: #34d399; border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.1); }
        .level-experto { color: #a3e635; border-color: rgba(163,230,53,0.3); background: rgba(163,230,53,0.1); }
        .breakdown-section {
            width: 100%;
            margin-top: 10px;
            text-align: left;
        }
        .breakdown-title {
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .breakdown-item .correct-count {
            color: var(--color-turf-glow);
            font-weight: 600;
        }
        .btn-restart {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--color-turf);
            color: var(--color-turf-glow);
            padding: 14px 40px;
            border-radius: 14px;
            font-family: var(--font-title);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-restart:hover {
            background: rgba(16, 185, 129, 0.25);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }
        .quiz-content { display: flex; flex-direction: column; flex-grow: 1; }
        .quiz-content.hidden { display: none; }
        @media (max-width: 600px) {
            .quiz-card { padding: 24px; }
            .question-text { font-size: 1.2rem; }
            .app-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="app-badge">Evaluación de Conocimiento</div>
        <h1 class="app-title">Impacto del Caucho en Canchas de Fútbol</h1>
        <p class="app-subtitle">Responde las preguntas para medir la profundidad de tu conocimiento</p>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">Pregunta 1 de 12</div>

    <div class="quiz-card" id="quizCard">
        <div class="quiz-content" id="quizContent">
            <div class="question-number" id="qNumber">Pregunta 1</div>
            <div class="question-category" id="qCategory">Categoría: General</div>
            <div class="question-text" id="qText">Cargando...</div>
            <div class="options-list" id="optionsList"></div>
            <div class="explanation-box" id="explanationBox"></div>
            <button class="btn-next" id="btnNext">Siguiente &rarr;</button>
        </div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-icon" id="resultsIcon">&#127942;</div>
            <div class="results-score" id="resultsScore">0/12</div>
            <div class="results-level" id="resultsLevel">-</div>
            <div class="results-label">Nivel de Conocimiento</div>
            <div class="results-detail" id="resultsDetail">.</div>
            <div class="breakdown-section">
                <div class="breakdown-title">Desglose por Categoría</div>
                <div id="breakdownContainer"></div>
            </div>
            <button class="btn-restart" id="btnRestart">Reintentar Evaluación</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                category: "Fundamentos",
                question: "En una cancha de césped sintético de tercera generación, el relleno de caucho SBR proviene principalmente de neumáticos reciclados. ¿Qué proceso de degradación experimenta este material con el tiempo en condiciones de intemperie?",
                options: [
                    "Se biodegrada por acción microbiana convirtiéndose en compuestos orgánicos inocuos",
                    "Se polimeriza formando una capa más dura y resistente que encapsula los contaminantes",
                    "Se volatiliza a temperatura ambiente liberando gases de efecto invernadero",
                    "Se fragmenta por radiación UV, fricción y humedad en microplásticos y libera aditivos químicos como zinc y HAP"
                ],
                correct: 3,
                explanation: "El caucho SBR no se biodegrada ni se polimeriza. La radiación UV, el viento y la fricción constante lo fragmentan en microplásticos, liberando además aditivos como óxido de zinc e hidrocarburos aromáticos policíclicos (HAP) presentes en los neumáticos reciclados."
            },
            {
                category: "Salud",
                question: "Un estudio de 2022 detectó microplásticos en sangre humana por primera vez. ¿Qué característica de las partículas de caucho las hace especialmente peligrosas para la salud respiratoria?",
                options: [
                    "Su tamaño submicrónico (0.1-10 µm) permite atravesar la barrera alveolar y entrar al torrente sanguíneo, donde pueden transportar toxinas adsorbidas",
                    "Su alta densidad hace que se depositen rápidamente en el suelo sin ser inhalables",
                    "Son hidrosolubles y se eliminan fácilmente por la orina antes de causar daño",
                    "Su carga electrostática las repele del tejido pulmonar humano"
                ],
                correct: 0,
                explanation: "Las partículas de caucho se fragmentan hasta tamaños submicrónicos (0.1-10 µm). A ese tamaño pueden atravesar la barrera alveolar, entrar al torrente sanguíneo y transportar toxinas adsorbidas como metales pesados y HAP, causando inflamación sistémica."
            },
            {
                category: "Salud",
                question: "El caucho reciclado contiene múltiples aditivos. ¿Cuál de estos compuestos es una preocupación particular por su potencial carcinógeno y movilidad ambiental?",
                options: [
                    "Dióxido de titanio (pigmento blanco inerte)",
                    "Plastificantes (ftalatos) que se lixivian con la lluvia ácida",
                    "Hidrocarburos Aromáticos Policíclicos (HAP) como benzo(a)pireno, que son bioacumulables",
                    "Aceite mineral blanco (considerado seguro por la OMS)"
                ],
                correct: 2,
                explanation: "Los HAP, especialmente el benzo(a)pireno, son subproductos de la combustión presentes en los neumáticos. Son carcinógenos reconocidos, bioacumulables y se lixivian con facilidad. Los ftalatos también son preocupantes, pero los HAP tienen mayor potencia carcinógena."
            },
            {
                category: "Datos",
                question: "Si la Cancha Verde Grande tiene 11 m³ de caucho y la tasa de liberación es de 0.02-2 g/m³/semana, ¿cuántos microplásticos llegarían al ambiente en un año (rango mínimo-máximo)?",
                options: [
                    "0.26 g - 26 g al año",
                    "11.44 g - 1,144 g al año",
                    "52 g - 520 g al año",
                    "2.2 g - 220 g al año"
                ],
                correct: 1,
                explanation: "Cálculo: 11 m³ × (0.02 a 2 g) = 0.22 a 22 g por semana. En un año: 0.22 × 52 = 11.44 g mínimo; 22 × 52 = 1,144 g (1.14 kg) máximo. Esto equivale a más de un kilo de microplásticos por año solo de una cancha escolar."
            },
            {
                category: "Datos",
                question: "Se estima que en Europa hay más de 50,000 canchas de césped sintético. Si cada cancha tiene ~10 m³ de caucho, ¿qué orden de magnitud de microplásticos liberan anualmente al ambiente?",
                options: [
                    "Entre 100 y 500 kg en total",
                    "Entre 500 kg y 5 toneladas",
                    "Entre 5,000 y 10,000 toneladas",
                    "Entre 10,000 y 60,000 toneladas"
                ],
                correct: 3,
                explanation: "50,000 canchas × ~10 m³ × 0.02-2 g/m³/semana × 52 semanas = 520 a 52,000 toneladas/año. La ECHA estima que las canchas sintéticas son la segunda fuente de microplásticos primarios liberados al ambiente en la UE."
            },
            {
                category: "Comparativas",
                question: "Según los datos comparativos, el cangrejo tiene 592 partículas/m³ de microplásticos. ¿Cómo se compara esto con la cantidad en bolsas de té, que tienen rangos muy altos en la escala de concentración?",
                options: [
                    "El cangrejo tiene más de 10 veces la concentración máxima de las bolsas de té",
                    "Las bolsas de té tienen más porque se calientan en agua",
                    "El cangrejo tiene aproximadamente la mitad que las bolsas de té",
                    "Ambos tienen concentraciones equivalentes"
                ],
                correct: 0,
                explanation: "El cangrejo (592 partículas/m³) supera por más de 10× el máximo de bolsas de té (52.3). Esto se debe a que los organismos filtradores y de fondo marino bioacumulan microplásticos del agua, actuando como concentradores biológicos."
            },
            {
                category: "Comparativas",
                question: "Los microplásticos aerotransportados (3.99-41.12 partículas/m³) compiten con otras fuentes. ¿Qué implicación tiene esto para los deportistas en canchas sintéticas?",
                options: [
                    "El riesgo es despreciable comparado con la contaminación urbana de fondo",
                    "Solo es peligroso si hay viento fuerte durante el partido",
                    "La exposición en cancha puede duplicar o triplicar la concentración base de microplásticos inhalados durante la actividad física intensa",
                    "Los deportistas están protegidos porque respiran por la nariz"
                ],
                correct: 2,
                explanation: "Durante el ejercicio intenso, la ventilación pulmonar aumenta 10-20 veces. Además, la fricción constante del juego resuspende partículas atrapadas. Esto puede multiplicar la dosis inhalada de microplásticos por 2-3× respecto al reposo en zonas urbanas."
            },
            {
                category: "Alternativas",
                question: "El corcho natural es una alternativa ecológica, pero tiene una limitación importante frente al caucho en climas extremos. ¿Cuál es?",
                options: [
                    "Es más pesado que el caucho, lo que afecta el drenaje",
                    "Se descompone en menos de un año",
                    "Atrae insectos y roedores",
                    "En climas muy secos puede volverse quebradizo y perderse por erosión eólica, requiriendo reposición más frecuente"
                ],
                correct: 3,
                explanation: "El corcho es 100% biodegradable y excelente para amortiguación, pero en climas áridos pierde humedad, se vuelve quebradizo y puede ser arrastrado por el viento. Requiere reposición periódica, elevando costos de mantenimiento."
            },
            {
                category: "Alternativas",
                question: "La fibra de coco como relleno tiene una propiedad única frente al caucho y la arena. ¿Cuál es su principal ventaja hidrotérmica?",
                options: [
                    "Refleja el 90% de la radiación solar, manteniendo la cancha 15°C más fría que el caucho",
                    "Absorbe y retiene hasta 8-10 veces su peso en agua, enfriando por evaporación y reduciendo la temperatura hasta 30%",
                    "Genera su propia sombra al expandirse con el calor",
                    "Se derrite a altas temperaturas formando una capa reflectante"
                ],
                correct: 0,
                explanation: "El color claro de la fibra de coco refleja gran parte de la radiación solar, a diferencia del caucho negro que absorbe calor. El enfriamiento evaporativo del agua retenida también contribuye. La reducción de temperatura puede superar los 10-15°C en días cálidos."
            },
            {
                category: "Ambiental",
                question: "Las partículas de caucho migran fuera de las canchas por varios vectores. ¿Cuál es la principal ruta de dispersión hacia ecosistemas acuáticos?",
                options: [
                    "Degradación por ozono troposférico que las convierte en gases solubles en lluvia",
                    "Escorrentía pluvial que arrastra partículas a desagües y cuerpos de agua, donde actúan como vectores de contaminantes",
                    "Absorción por raíces de césped y liberación al acuífero",
                    "Evaporación durante el día y condensación en nubes"
                ],
                correct: 1,
                explanation: "Las partículas de caucho son arrastradas por la lluvia hacia el drenaje. No se degradan por ozono ni se evaporan. Una vez en ríos y océanos, actúan como vectores transportando toxinas adsorbidas y son ingeridas por organismos acuáticos."
            },
            {
                category: "Ambiental",
                question: "Una cancha de fútbol sintética puede alcanzar temperaturas superficiales de hasta 70°C en verano. ¿Cómo contribuye el relleno de caucho negro a este fenómeno?",
                options: [
                    "El caucho tiene alta capacidad calorífica y almacena calor liberándolo lentamente durante la noche",
                    "El caucho negro tiene baja reflectancia (albedo ~0.05) y alta absorción de radiación infrarroja, actuando como un colector solar",
                    "El caucho genera calor exotérmico al reaccionar con el oxígeno atmosférico",
                    "El caucho conduce el calor desde el subsuelo hacia la superficie"
                ],
                correct: 1,
                explanation: "El caucho negro tiene un albedo muy bajo (~0.05), lo que significa que absorbe ~95% de la radiación solar. Además, el césped sintético no transpira ni se enfría por evaporación. Esto crea un efecto 'isla de calor' que eleva la temperatura hasta 70°C."
            },
            {
                category: "Conciencia",
                question: "Un municipio planea construir 5 canchas sintéticas con caucho SBR. Como asesor ambiental, ¿qué argumento integrado presentarías considerando salud, ambiente y economía a largo plazo?",
                options: [
                    "El caucho SBR es la opción más segura certificada por la FIFA no requiere cambio",
                    "El caucho solo afecta a jugadores profesionales, no a niños",
                    "El costo inicial menor del caucho se compensa con costos de reposición por pérdida de material y potenciales pasivos ambientales futuros por contaminación por microplásticos",
                    "Las alternativas naturales son 5 veces más caras y duran la mitad"
                ],
                correct: 2,
                explanation: "Aunque el caucho SBR tiene menor costo inicial, se pierde ~20% anual por dispersión y degradación. Las alternativas como corcho o fibra de coco, aunque más caras inicialmente, eliminan el pasivo ambiental de los microplásticos y reducen la temperatura, mejorando la salud de los deportistas."
            }
        ];

        let currentQ = 0;
        let score = 0;
        let answers = [];
        let answered = false;

        const quizContent = document.getElementById('quizContent');
        const resultsScreen = document.getElementById('resultsScreen');
        const qNumber = document.getElementById('qNumber');
        const qCategory = document.getElementById('qCategory');
        const qText = document.getElementById('qText');
        const optionsList = document.getElementById('optionsList');
        const explanationBox = document.getElementById('explanationBox');
        const btnNext = document.getElementById('btnNext');
        const progressFill = document.getElementById('progressFill');
        const progressLabel = document.getElementById('progressLabel');

        function renderQuestion(index) {
            const q = questions[index];
            qNumber.textContent = `Pregunta ${index + 1}`;
            qCategory.textContent = `Categoría: ${q.category}`;
            qText.textContent = q.question;
            explanationBox.style.display = 'none';
            btnNext.style.display = 'none';
            answered = false;

            optionsList.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.dataset.index = i;
                btn.addEventListener('click', () => selectOption(i));
                optionsList.appendChild(btn);
            });

            progressFill.style.width = `${((index) / questions.length) * 100}%`;
            progressLabel.textContent = `Pregunta ${index + 1} de ${questions.length}`;
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;

            const q = questions[currentQ];
            const btns = optionsList.querySelectorAll('.option-btn');
            btns.forEach(b => b.classList.add('disabled'));

            if (index === q.correct) {
                btns[index].classList.add('correct');
                score++;
            } else {
                btns[index].classList.add('incorrect');
                btns[q.correct].classList.add('correct');
            }
            btns.forEach((b, i) => {
                if (i !== index && i !== q.correct && q.correct === index) {
                    b.classList.add('show-correct');
                }
            });

            explanationBox.textContent = q.explanation;
            explanationBox.style.display = 'block';

            if (currentQ < questions.length - 1) {
                btnNext.textContent = 'Siguiente →';
            } else {
                btnNext.textContent = 'Ver Resultados';
            }
            btnNext.style.display = 'block';
        }

        btnNext.addEventListener('click', () => {
            if (currentQ < questions.length - 1) {
                currentQ++;
                renderQuestion(currentQ);
            } else {
                showResults();
            }
        });

        function showResults() {
            quizContent.classList.add('hidden');
            resultsScreen.classList.add('visible');

            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('resultsScore').textContent = `${score}/${questions.length}`;

            let level, levelClass, detail;
            if (pct >= 90) {
                level = 'Experto';
                levelClass = 'level-experto';
                detail = 'Tienes un conocimiento profundo y detallado sobre el impacto del caucho en canchas sintéticas. Comprendes los riesgos de salud, datos cuantitativos y alternativas.';
            } else if (pct >= 70) {
                level = 'Avanzado';
                levelClass = 'level-avanzado';
                detail = 'Tienes un buen nivel de conocimiento. Manejas conceptos importantes pero hay aspectos específicos que podrías profundizar.';
            } else if (pct >= 40) {
                level = 'Intermedio';
                levelClass = 'level-intermedio';
                detail = 'Conoces las ideas generales pero te falta profundizar en datos específicos, riesgos detallados y alternativas concretas.';
            } else {
                level = 'Básico';
                levelClass = 'level-basico';
                detail = 'Estás empezando a explorar el tema. Te recomendamos revisar la presentación completa para fortalecer tu comprensión.';
            }

            const levelEl = document.getElementById('resultsLevel');
            levelEl.textContent = `Nivel: ${level}`;
            levelEl.className = `results-level ${levelClass}`;

            document.getElementById('resultsDetail').textContent = detail;

            const icons = { 'Experto': '\u{1F3C6}', 'Avanzado': '\u{1F4A1}', 'Intermedio': '\u{1F4DA}', 'Básico': '\u{1F331}' };
            document.getElementById('resultsIcon').textContent = icons[level] || '\u{1F3AF}';

            const categories = {};
            questions.forEach((q, i) => {
                if (!categories[q.category]) categories[q.category] = { total: 0, correct: 0 };
                categories[q.category].total++;
                if (answers[i] !== undefined && answers[i] === q.correct) {
                    categories[q.category].correct++;
                }
            });

            const container = document.getElementById('breakdownContainer');
            container.innerHTML = '';
            for (const [cat, data] of Object.entries(categories)) {
                const div = document.createElement('div');
                div.className = 'breakdown-item';
                div.innerHTML = `<span>${cat}</span><span class="correct-count">${data.correct}/${data.total}</span>`;
                container.appendChild(div);
            }
        }

        document.getElementById('btnRestart').addEventListener('click', () => {
            currentQ = 0;
            score = 0;
            answers = [];
            resultsScreen.classList.remove('visible');
            quizContent.classList.remove('hidden');
            renderQuestion(0);
        });

        renderQuestion(0);
    </script>
</body>
</html>
